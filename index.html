<!doctype html>
<html>

<link href="CSS/index.css" rel="stylesheet">

<link rel="stylesheet" href="CSS/fontanwesome/css/all.css">
	
<title>Nguyễn Quốc Hưng</title>

	<script>
		$(document).ready(function(){
			
			$(".navbar").innerHeight(window.innerHeight);
			$(".home-intro").innerHeight(window.innerHeight);
			$(".home-intro").innerWidth(window.innerWidth-120);
			$(".contact").innerHeight(window.innerHeight);
			$(".contact").innerWidth(window.innerWidth-120);
			
			
			
			
			$(".contact").hide();
			
			$("#contact").click(function(){
				
				$(".home-intro").hide();
				$(".contact").show();
				
				
				$("#contact").css("background-color", "black");
				$("#home").css("background-color", "#1F1F1F");
				$("#info").css("background-color", "#1F1F1F");
				
			});
			
			$("#home").click(function(){
				
				$(".contact").hide();
				$(".home-intro").show();
				
				$("#contact").css("background-color", "#1F1F1F");
				$("#home").css("background-color", "black");
				$("#info").css("background-color", "#1F1F1F");
				
			});
			
			$("#info").click(function(){
				
				$(".contact").hide();
				$("#name").show();
				
				$("#contact").css("background-color", "#1F1F1F");
				$("#home").css("background-color", "#1F1F1F");
				$("#info").css("background-color", "black");
				
			});
			
			
			$(".map").hide();
			$("#map").click(function(){
				$(".map").fadeToggle();
			});
		});
	
	</script>
