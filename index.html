<script>
	$(document).ready(function(){
		
		$(".info").hide();
		$(".contact").hide();
		$(".map").hide();
		
		
		$(".fa-home").click(function(){
			$(".name").fadeToggle(0);
			$(".info").hide();

		});
		$(".fa-user-secret").click(function(){
			$(".name").hide();

		});
		$(".fa-envelope").click(function(){
			$(".name").hide();
			$(".info").hide();
			$(".contact").fadeToggle(0);
		});
		$(".fa-map-marked-alt").click(function(){
			$(".map").fadeToggle(500);
		});
		$("#mapclear").click(function(){
			$(".map").fadeOut(500);
		});
	});
	
</script>
